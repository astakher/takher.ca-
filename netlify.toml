[build]
  command = "npm run build"
  publish = "dist"

# Serve the Vibe PDF app at takher.ca/pdf (and /pdf/) by proxying to its Netlify
# site. The app uses an absolute "/pdf/" base, so assets resolve with or without
# the trailing slash. Proxy to the vibe site's /pdf/ path (its own rewrite maps
# /pdf/* back to the physical files). No 301s -> no trailing-slash redirect loop.
[[redirects]]
  from = "/pdf"
  to = "https://vibe-pdf.netlify.app/pdf/"
  status = 200
  force = true

[[redirects]]
  from = "/pdf/*"
  to = "https://vibe-pdf.netlify.app/pdf/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"
