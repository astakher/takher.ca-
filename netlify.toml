[build]
  command = "npm run build"
  publish = "dist"

# Serve the Vibe PDF app at takher.ca/pdf/ by proxying to its Netlify site.
# The app is built with a relative base, so its assets resolve under /pdf/.
# (No /pdf -> /pdf/ 301: it fought Netlify's trailing-slash canonicalization and
# caused a redirect loop. The nav links to "/pdf/" directly, so this covers it.)
[[redirects]]
  from = "/pdf/*"
  to = "https://vibe-pdf.netlify.app/:splat"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Robots-Tag = "noindex"
